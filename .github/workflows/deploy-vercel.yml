name: Deploy to Vercel (DISABLED - Flutter App)

# This workflow is disabled for Flutter mobile projects
# Flutter apps deploy to Google Play Store / App Store, not Vercel
# To enable web deployment, configure this for Flutter Web build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  Deploy-Production:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Info
        run: |
          echo "ℹ️ Vercel deployment is disabled for Flutter mobile projects"
          echo "🚀 To deploy Flutter Web: Configure Flutter web build"
          echo "📱 To deploy mobile APK: Configure Play Store / App Store deployment"
